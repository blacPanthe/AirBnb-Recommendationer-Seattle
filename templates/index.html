<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Airbnb Recommendation System</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="logo">
        <svg width="30" height="30" viewBox="0 0 1000 1000" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
          <path fill="#FF385C" d="M499.3 736.7c-51-64-81-120.1-91-168.1-10-39-6-70 11-93 18-27 45-40 80-40s62 13 80 40c17 23 21 54 11 93-10 48-40 104-91 168.1zm362.2 43c-7 47-39 86-83 105-85 37-169.1-22-241.1-102 119.1-149.1 141.1-265.1 90-340.2-30-43-73-64-128.1-64-111 0-172.1 94-148.1 203.1 14 59 51 126.1 110 198.1-37 43-74 76-109 99-46 31-100 46-155.1 43C106 913.1 32 842.1 15 754c-9-49-1-99 23-139 14-21 29-42 51-62L399.2 252.6c34-39 85-62 137.1-62s103 23 137.1 62L983.4 552.8c22 20 37 41 51 62 24 40 32 90 23 139z"/>
        </svg>
        <span>Airbnb Recommender</span>
      </div>
      <p class="header-sub">BERTopic-powered listing recommendations &mdash; Seattle dataset</p>
    </div>
  </header>

  <main>
    <div class="two-col">

      <!-- Sidebar: topic pills -->
      <aside class="topic-sidebar">
        <h2>Browse by Topic</h2>
        <p class="hint">Click a topic to see listings</p>
        <div id="topic-pills" class="pill-list">
          <div class="skeleton-pill"></div>
          <div class="skeleton-pill"></div>
          <div class="skeleton-pill"></div>
          <div class="skeleton-pill"></div>
          <div class="skeleton-pill"></div>
          <div class="skeleton-pill"></div>
        </div>
      </aside>

      <!-- Main: listing cards -->
      <div class="results-area">
        <div id="topic-header" class="results-header hidden">
          <h2 id="topic-title"></h2>
          <div id="topic-keywords" class="keyword-chips"></div>
        </div>
        <div id="topic-empty" class="empty-state">
          <span class="empty-icon">&#127968;</span>
          <p>Select a topic from the sidebar to browse listings</p>
        </div>
        <div id="topic-results" class="card-grid"></div>
      </div>

    </div>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
